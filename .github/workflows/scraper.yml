name: Scraper Vodafone diario

# Cron en UTC. 06:00 UTC = 07:00 (invierno) / 08:00 (verano) en Madrid.
# workflow_dispatch permite lanzarlo a mano desde la pestana Actions.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: scraper
    env:
      # --- Secretos (crear en Settings -> Secrets and variables -> Actions) ---
      VODAFONE_USER: ${{ secrets.VODAFONE_USER }}
      VODAFONE_PASS: ${{ secrets.VODAFONE_PASS }}
      IMAP_USER: ${{ secrets.IMAP_USER }}
      IMAP_PASS: ${{ secrets.IMAP_PASS }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # --- Valores no secretos (pueden ir aqui directamente) ---
      IMAP_HOST: imap.ionos.es
      IMAP_PORT: "993"
      OTP_SENDER: info@vodafone.es
      TARGET_CIF: B47573944
      TARGET_ACCOUNT: "29250841"
      HEADLESS: "true"
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Subir logs/capturas si falla (para depurar)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: |
            scraper/debug
            scraper/last_run.log
          if-no-files-found: ignore
          retention-days: 7
